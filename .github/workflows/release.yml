name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin duckport-server

      - name: Rename binary
        run: cp target/release/duckport-server duckport-server-linux-x86_64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: duckport-server-linux-x86_64
          generate_release_notes: true
